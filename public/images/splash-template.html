<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 1200px;
      overflow: hidden;
      background: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Background glow */
    .bg-glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(92,124,250,0.12) 0%, rgba(168,85,247,0.08) 40%, transparent 70%);
    }

    /* Bus icon */
    .bus-icon {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #5c7cfa, #a855f7);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      box-shadow: 0 8px 40px rgba(92,124,250,0.35);
      margin-bottom: 32px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 56px;
      font-weight: 900;
      background: linear-gradient(135deg, #5c7cfa, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
      margin-bottom: 12px;
      position: relative;
      z-index: 2;
    }

    .tagline {
      font-size: 22px;
      color: #666;
      font-weight: 400;
      position: relative;
      z-index: 2;
    }

    /* Loading dots */
    .loading {
      position: absolute;
      bottom: 80px;
      display: flex;
      gap: 10px;
      z-index: 2;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #5c7cfa;
      opacity: 0.3;
    }

    .dot:nth-child(1) { animation: pulse 1.4s ease-in-out infinite; }
    .dot:nth-child(2) { animation: pulse 1.4s ease-in-out 0.2s infinite; }
    .dot:nth-child(3) { animation: pulse 1.4s ease-in-out 0.4s infinite; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
      40% { opacity: 1; transform: scale(1.2); }
    }

    /* Subtle grid */
    .grid {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(92,124,250,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(92,124,250,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="bg-glow"></div>
  <div class="bus-icon">🚌</div>
  <h1>AgentBus</h1>
  <p class="tagline">Decentralized Agent Network</p>
  <div class="loading">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
